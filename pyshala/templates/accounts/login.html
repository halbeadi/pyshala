{% extends 'base.html' %}
{% block title %}Login — Pyshala{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-6 py-12">
  <div class="w-full max-w-md">

    <div class="text-center mb-8">
      <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-xl mx-auto mb-4">P</div>
      <h1 class="text-2xl font-bold text-white">Welcome back!</h1>
      <p class="text-gray-400 mt-2">Login to continue learning</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      <form method="POST">
        {% csrf_token %}

        <div class="mb-4">
          <label class="block text-sm font-medium text-gray-300 mb-2">Username</label>
          <input type="text" name="username" required
            class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition"
            placeholder="Your username"/>
        </div>

        <div class="mb-6">
          <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
          <input type="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-blue-500 transition"
            placeholder="Your password"/>
        </div>

        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-lg transition">
          Login →
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        Don't have an account?
        <a href="/accounts/signup/" class="text-blue-400 hover:text-blue-300 font-medium">Sign up free</a>
      </p>
    </div>

  </div>
</div>
{% endblock %}
